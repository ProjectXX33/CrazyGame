name: Ping Supabase

on:
  schedule:
    # Runs at 00:00 on every 3rd day
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          # Fail loudly if a secret is missing, so the job can't go green on an empty key.
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_KEY secret is missing/empty."
            exit 1
          fi
          # -f makes curl exit non-zero on HTTP errors (e.g. missing key, missing table).
          curl -sf -X GET "$SUPABASE_URL/rest/v1/products?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY"
